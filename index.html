<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Weather app</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
         <div id="container">
            <h1>My Weather App</h1>
            <input type="text" placeholder="Enter city" id="city">
            <button id="btn">Search</button>
            <div id="icon">
                <img id="cloud"
                src="cloud-icon-22.png" alt="">
            </div>

            <div class="temp">
            <h2 id="temper">25°C</h2>
            <p id="des">Clear sky</p>
            </div>
        <div class="details">
            <div>
                <img src="temperature-png.webp" alt="">
                <p id="feel">Feels like:25°C</p></div>
            <div>
                <img src="humidity-vetor-icon-vector.webp" alt="">
                <p id="humidity">Humidity:70%</p></div>
            <div>
                <img src="emoji-clipart-wind-19.png" alt="">
               <p id="wind"> Wind:4m/s</p></div>
        </div>
         </div>
    </div>
    <script src="style.js"></script>
</body>
</html>
